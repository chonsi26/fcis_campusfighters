<html lang="en">
<head>
    <meta charset="UTF-8">

        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        canvas {
            border: 3px solid black;
            display: block;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        #gameOver, #selectionScreen, #modeSelectionScreen, #roundDisplay, #winnerDisplay, #gameOverScreen, #settingsScreen, #startScreen, #loadingScreen, #pauseScreen, #mapSelectionScreen { /* Added #pauseScreen, #mapSelectionScreen */
            position: absolute;
            font-family: Arial, sans-serif;
            text-align: center;
            color: rgb(255, 255, 255);
            text-shadow: 3px 3px 6px black;
            top: 100px;
        }
        #gameOver {
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            color: red;
            z-index: 2;
        }
        #roundDisplay {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: yellow;
            display: none;
            z-index: 2;
        }
        #winnerDisplay {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: yellow;
            display: none;
            z-index: 2;
        }
        #selectionScreen, #modeSelectionScreen, #gameOverScreen, #settingsScreen, #pauseScreen, #mapSelectionScreen { /* Added #pauseScreen, #mapSelectionScreen */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2;
        }
        #selectionScreen {
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            padding: 25px;
            border-radius: 15px;
            background: transparent;
            overflow-y: auto;
            z-index: 2;
            scrollbar-width: none; /* For Firefox */
            -ms-overflow-style: none; /* For Internet Explorer and Edge */
        }

        #selectionScreen::-webkit-scrollbar {
            display: none; /* Hide scrollbar for WebKit browsers */
        }

        #selectionScreen h2, #modeSelectionScreen h2, #gameOverScreen h2, #settingsScreen h2, #startScreen h2, #loadingScreen h2, #pauseScreen h2, #mapSelectionScreen h2 { /* Added #pauseScreen h2, #mapSelectionScreen h2 */
            margin: 0 0 25px;
            font-size: 32px;
            font-family: 'Orbitron', sans-serif;
        }
        #modeSelectionScreen button, #gameOverScreen button, #settingsScreen button, #pauseButton, #pauseScreen button, #mapSelectionScreen button { /* Added #pauseScreen button, #mapSelectionScreen button */
            padding: 12px 25px;
            margin: 6px;
            font-size: 20px;
            cursor: pointer;
            background-color: #257fc1;
            color: #f3a33d;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
        }
        #modeSelectionScreen button:hover, #gameOverScreen button:hover, #settingsScreen button:hover, #pauseButton:hover, #pauseScreen button:hover, #mapSelectionScreen button:hover { /* Added #pauseScreen button:hover, #mapSelectionScreen button:hover */
            background-color: #103775;
        }
        #characterGrid {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            row-gap: 2px;
            column-gap: 5px;
            justify-items: center;
        }
        .character-portrait {
            width: 50px;
            height: 50px;
            background-color: #333;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .character-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .character-portrait:hover {
            transform: scale(1.1);
            border-color: #4CAF50;
        }
        .character-portrait.selected {
            border-color: #000000;
            transform: scale(1.1);
        }
        .character-portrait.focused {
            border-color: #f3a33d; /* Yellow border for keyboard focus */
            transform: scale(1.1);
        }
        .character-portrait .character-name {
            display: none;
        }
        #gameOverScreen, #settingsScreen, #startScreen, #modeSelectionScreen, #loadingScreen, #pauseScreen, #mapSelectionScreen { /* Added #pauseScreen, #mapSelectionScreen */
            display: none;
        }
        #pauseButton {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-family: Arial, sans-serif;
            display: none;
            z-index: 2;
        }
        #settingsScreen label {
            display: block;
            font-size: 20px;
            margin: 15px 0 5px;
        }
        #settingsScreen input[type="range"] {
            width: 200px;
            cursor: pointer;
        }
        #settingsScreen .key-bind-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;

            width: 150px;
            text-align: left;
        }
        #settingsScreen .key-bind-row input {

            text-align: center;
            padding: 5px;
            border-radius: 3px;
            border: 1px solid #ccc;
            background-color: #333;
            color: white;
            cursor: pointer;
        }
        #settingsScreen .controls-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
        }
        #settingsScreen .player-controls {
            flex: 1;
            min-width: 250px;
        }
        #startScreen {

            height: 510px;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;

            color: #f3a33d;

            margin-bottom: 20px;
        }
        #startScreen p {

            color: white;

        }
        #loadingScreen {

            height: 510px;
            background: transparent;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        #loadingScreen h2 {
            font-size: 48px;
            color: #f3a33d;
        }

        }
        #gamemodebackground {

            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 510px;

            background-position: center;

            z-index: 0;

        #mapSelectionScreen {

        }
        #mapGrid {

        }
        .map-preview {
            width: 250px;
            height: 150px;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .map-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

            border-color: #f3a33d;
        }

        }
        .map-name {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 16px;
            padding: 5px 0;

        #mapPreviewDisplay {
            width: 1200px;
            height: 510px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-size: cover;
            background-position: center;
            border: 3px solid black;
            z-index: 0;
            display: none;
        }
        .back-button {

            left: 20px;

            cursor: pointer;
            background-color: #f44336; /* Red color for back button */
            color: white;

            border-radius: 6px;
            z-index: 3; /* Ensure it's above other elements */
        }
        .back-button:hover {
            background-color: #da190b;
        }

        function handleKeybindInput(e) {
            if (currentKeybindInput) {
                const newKey = e.key.toLowerCase();
                const action = currentKeybindInput.dataset.action;

                // Prevent binding 'Enter' or 'Space' for character selection
                if (newKey === 'enter' || newKey === ' ') {
                    currentKeybindInput.value = currentKeybindInput.dataset.originalValue ? currentKeybindInput.dataset.originalValue.toUpperCase() : 'INVALID';
                    currentKeybindInput = null;
                    return;
                }

                // Check for duplicate bindings
                let isDuplicate = false;
                for (const player in player1Keys) {
                    if (player1Keys[player] === newKey && `p1-${player}` !== action) {
                        isDuplicate = true;
                        break;
                    }
                }
                if (!isDuplicate) {
                    for (const player in player2Keys) {
                        if (player2Keys[player] === newKey && `p2-${player}` !== action) {
                            isDuplicate = true;
                            break;
                        }
                    }
                }

                if (isDuplicate) {
                    alert(`Key "${newKey.toUpperCase()}" is already bound to another action. Please choose a different key.`);
                    currentKeybindInput.value = currentKeybindInput.dataset.originalValue ? currentKeybindInput.dataset.originalValue.toUpperCase() : 'ERROR';
                } else {
                    currentKeybindInput.value = newKey.toUpperCase();
                    currentKeybindInput.dataset.originalValue = newKey; // Store original value

                    if (action.startsWith('p1-')) {
                        player1Keys[action.substring(3)] = newKey;
                    } else if (action.startsWith('p2-')) {
                        player2Keys[action.substring(3)] = newKey;
                    }
                    saveKeybindings();
                }
                currentKeybindInput = null;
            }
        }

        function handleCharacterSelectionKeys() {
            if (selectionScreen.style.display !== 'block') return;

            const gridColumns = 10;
            const totalCharacters = characterPortraits.length;

            characterPortraits[focusedCharacterIndex].classList.remove('focused');

            let keyProcessed = false;

            if (keys[player1Keys.jump] && !prevKeys[player1Keys.jump]) { // Player 1 Jump (Up)
                focusedCharacterIndex -= gridColumns;
                if (focusedCharacterIndex < 0) focusedCharacterIndex += totalCharacters;
                keyProcessed = true;
            } else if (keys[player1Keys.duck] && !prevKeys[player1Keys.duck]) { // Player 1 Duck (Down)
                focusedCharacterIndex += gridColumns;
                if (focusedCharacterIndex >= totalCharacters) focusedCharacterIndex -= totalCharacters;
                keyProcessed = true;
            } else if (keys[player1Keys.left] && !prevKeys[player1Keys.left]) { // Player 1 Left
                focusedCharacterIndex--;
                if (focusedCharacterIndex < 0) focusedCharacterIndex = totalCharacters - 1;
                keyProcessed = true;
            } else if (keys[player1Keys.right] && !prevKeys[player1Keys.right]) { // Player 1 Right
                focusedCharacterIndex++;
                if (focusedCharacterIndex >= totalCharacters) focusedCharacterIndex = 0;
                keyProcessed = true;
            } else if ((keys.enter || keys[' ']) && !(prevKeys.enter || prevKeys[' '])) {
                const selectedChar = characterPortraits[focusedCharacterIndex].dataset.character;
                selectCharacter(selectedChar, characterPortraits[focusedCharacterIndex]);
                return;
            }

            if (keyProcessed) {
                characterPortraits[focusedCharacterIndex].classList.add('focused');
                characterPortraits[focusedCharacterIndex].focus();
                characterPortraits[focusedCharacterIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                focusSound.currentTime = 0;
                focusSound.play().catch(e => console.log("Focus sound play error:", e));
            }
        }

        function cpuAI(player, opponent, deltaTime, allowMovementOnly = false, teamMate = null) {
            if (player.healthBars <= 0) return;
            const distance = Math.abs(player.x - opponent.x);
            const random = Math.random();

            if (player.attackCooldown <= 0) {
                player.attacking = null;
            }
            player.ducking = false;
            player.backflip = false;
            player.frontflip = false; // CPU doesn't do frontflips
            player.backflipStartTime = null;
            player.frontflipStartTime = null;
            player.blocking = false; // CPU cannot block

            player.direction = player.x < opponent.x ? 'right' : 'left';

            let moving = false;
            if (!allowMovementOnly) {
                if (distance > 150 && !player.attacking) {
                    const moveSpeed = (player.attacking ? player.speed * 0.5 : player.speed) * (deltaTime / targetDeltaTime);
                    if (player.x < opponent.x) {
                        player.x += moveSpeed;
                        moving = true;
                    } else {
                        player.x -= moveSpeed;
                        moving = true;
                    }
                }

                if (random < 0.02 && !player.jumping && !player.ducking && !player.attacking) {
                    player.dy = player.jumpPower;
                    player.jumping = true;
                }

                if (distance < 150 && player.attackCooldown <= 0) {
                    if (random < 0.5) {
                        player.attacking = random < 0.25 ? 'punch' : 'kick';
                        player.attackCooldown = 30;
                    }
                }

                if (random < 0.05 && !player.jumping && !player.attacking) {
                    player.ducking = true;
                }
            } else {
                if (distance > 150) {
                    const moveSpeed = player.speed * (deltaTime / targetDeltaTime);
                    if (player.x < opponent.x) {
                        player.x += moveSpeed;
                        moving = true;
                    } else {
                        player.x -= moveSpeed;
                        moving = true;
                    }
                }

                if (random < 0.02 && !player.jumping && !player.ducking) {
                    player.dy = player.jumpPower;
                    player.jumping = true;
                }

                if (random < 0.05 && !player.jumping) {
                    player.ducking = true;
                }
            }

            // Update walk cycle for CPU
            if (moving && !player.jumping && !player.ducking && !player.attacking && !player.blocking) {
                player.walkCycle = (player.walkCycle + 0.1 * (deltaTime / targetDeltaTime)) % (2 * Math.PI);
            } else {
                player.walkCycle = 0; // Reset walk cycle when not walking
            }

            player.dy += player.gravity * (deltaTime / targetDeltaTime);
            player.y += player.dy * (deltaTime / targetDeltaTime);
            if (player.y > 255) {
                player.y = 255;
                player.dy = 0;
                player.jumping = false;
            }

            if (player.attackCooldown > 0) {
                player.attackCooldown -= (deltaTime / targetDeltaTime);
                if (player.attackCooldown <= 15) player.attacking = null;
            }

            if (player.x < 50) player.x = 50;
            if (player.x > canvas.width - player.width - 50) player.x = canvas.width - player.width - 50;
        }

        function checkCollision(attacker, opponent) {
            const attackRange = attacker.direction === 'right' ? 
                { x: attacker.x + attacker.width, y: attacker.y, width: 100, height: attacker.height } :
                { x: attacker.x - 100, y: attacker.y, width: 100, height: attacker.height };
            const opponentHitbox = {
                x: opponent.x,
                y: opponent.y,
                width: opponent.width,
                height: opponent.healthBars <= 0 ? opponent.defeatedHeight : opponent.height
            };
            const collides = attackRange.x < opponentHitbox.x + opponentHitbox.width &&
                             attackRange.x + attackRange.width > opponentHitbox.x &&
                             attackRange.y < opponentHitbox.y + opponentHitbox.height &&
                             attackRange.y + attackRange.height > opponentHitbox.y;
            return collides;
        }

        function triggerScreenShake(intensity = 3, duration = 6) {
            screenShake.intensity = intensity;
            screenShake.duration = duration;
        }

        function applyScreenShake() {
            if (screenShake.duration > 0) {
                const shakeX = (Math.random() - 0.5) * screenShake.intensity;
                const shakeY = (Math.random() - 0.5) * screenShake.intensity;
                ctx.translate(shakeX, shakeY);
                screenShake.duration--;
            }
        }

        function handleAttack(attacker, opponent, deltaTime) {
            if (!roundInProgress || opponent.healthBars <= 0) return;

            // Prevent friendly fire in TeamFight mode
            if (gameMode === 'TeamFight' && attacker.team === opponent.team) {
                return;
            }
            // In Royal Rumble, all opponents are 'cpu' team, so no friendly fire check needed.

            if (attacker.attacking && opponent.healthBars > 0) {
                if (checkCollision(attacker, opponent)) {
                    if (opponent.blocking) {
                        // Opponent is blocking, no damage
                        console.log(`${opponent.name} blocked the attack!`);
                        return; 
                    }

                    let damage = attacker.attacking === 'punch' ? attacker.punchDamage : attacker.kickDamage;
                    
                    // Adjust damage for Player 1 vs CPU in 1v1 modes
                    if ((gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight') && attacker === player1) {
                        damage *= 1.5;
                    }
                    // Adjust damage for Player 1 vs CPU in TeamFight mode (P1 vs P2/P4)
                    if (gameMode === 'TeamFight' && attacker === player1 && (opponent === player2 || opponent === player4)) {
                        damage *= 1.5;
                    }
                    // Adjust damage for Player 1 in Royal Rumble
                    if (gameMode === 'RoyalRumble' && attacker === player1) {
                        damage *= 1.5; // Player deals more damage
                    }

                    opponent.health -= damage * (deltaTime / targetDeltaTime);
                    if (attacker.attacking === 'punch') {
                        punchSound.currentTime = 0;
                        punchSound.play().catch(e => console.log("Punch sound play error:", e));
                    } else if (attacker.attacking === 'kick') {
                        kickSound.currentTime = 0;
                        kickSound.play().catch(e => console.log("Kick sound play error:", e));
                    }
                    triggerScreenShake();
                    if (opponent.health <= 0) {
                        if (opponent.healthBars > 1) {
                            opponent.health = 100;
                            opponent.healthBars--;
                        } else {
                            opponent.health = 0;
                            opponent.healthBars = 0;
                            // Royal Rumble: If an opponent is eliminated, restore health for all remaining fighters
                            if (gameMode === 'RoyalRumble') {
                                activeFighters.forEach(fighter => {
                                    if (fighter.healthBars > 0) { // Only restore if not eliminated
                                        fighter.health = 100; // Restore health to full
                                        // Restore health bars based on fighter type
                                        fighter.healthBars = fighter.team === 'player' ? 10 : 3; 
                                    }
                                });
                            }
                        }
                    }
                }
            }
        }

        function updatePlayer(player, opponent, playerKeybinds, deltaTime, allowAttacks = true) {
            if (!roundInProgress && player.healthBars <= 0) return;
            let isDuckingAttack = false;
            let moving = false; // Track if the player is moving horizontally
            
            // Reset blocking state if block duration is over
            if (player.blocking && player.blockDuration > 0) {
                player.blockDuration -= (deltaTime / targetDeltaTime);
                if (player.blockDuration <= 0) {
                    player.blocking = false;
                }
            }

            // Handle block input (pressed, not held)
            if (player.team === 'player' && keys[playerKeybinds.block] && !prevKeys[playerKeybinds.block] && !player.attacking && !player.jumping && !player.backflip && !player.frontflip) {
                player.blocking = true;
                player.blockDuration = 15; // Block for a short duration (e.g., 15 frames)
                player.attacking = null; // Cannot attack while blocking
            }

            if (allowAttacks && keys[playerKeybinds.duck]) {
                if (keys[playerKeybinds.left] && keys[playerKeybinds.punch] && player.attackCooldown <= 0) {
                    player.attacking = 'punch';
                    player.direction = 'left';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.frontflip = false;
                    player.backflipStartTime = null;
                    player.frontflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                    player.blocking = false; // Cannot block while attacking
                } else if (keys[playerKeybinds.left] && keys[playerKeybinds.kick] && player.attackCooldown <= 0) {
                    player.attacking = 'kick';
                    player.direction = 'left';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.frontflip = false;
                    player.backflipStartTime = null;
                    player.frontflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                    player.blocking = false;
                } else if (keys[playerKeybinds.right] && keys[playerKeybinds.punch] && player.attackCooldown <= 0) {
                    player.attacking = 'punch';
                    player.direction = 'right';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.frontflip = false;
                    player.backflipStartTime = null;
                    player.frontflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                    player.blocking = false;
                } else if (keys[playerKeybinds.right] && keys[playerKeybinds.kick] && player.attackCooldown <= 0) {
                    player.attacking = 'kick';
                    player.direction = 'right';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.frontflip = false;
                    player.backflipStartTime = null;
                    player.frontflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                    player.blocking = false;
                }
            }

            if (allowAttacks && !player.blocking) { // Only allow attacks if not blocking
                if (!isDuckingAttack && keys[playerKeybinds.punch] && player.attackCooldown <= 0) {
                    player.attacking = 'punch';
                    player.attackCooldown = 30;
                } else if (!isDuckingAttack && keys[playerKeybinds.kick] && player.attackCooldown <= 0) {
                    player.attacking = 'kick';
                    player.attackCooldown = 30;
                }
            }

            if (player.attackCooldown > 0) {
                player.attackCooldown -= (deltaTime / targetDeltaTime);
                if (player.attackCooldown <= 15) player.attacking = null;
            }

            if (!player.attacking && !player.backflip && !player.frontflip && !player.blocking) { // Cannot move while blocking
                if (keys[playerKeybinds.left] && !player.ducking && !player.jumping) {
                    player.x -= player.speed * (deltaTime / targetDeltaTime);
                    player.direction = 'left';
                    if (player.x < 0) player.x = 0;
                    moving = true;
                }
                if (keys[playerKeybinds.right] && !player.ducking && !player.jumping) {
                    player.x += player.speed * (deltaTime / targetDeltaTime);
                    player.direction = 'right';
                    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                    moving = true;
                }
            }

            // Update walk cycle
            if (moving && !player.jumping && !player.ducking && !player.attacking && !player.blocking) {
                player.walkCycle = (player.walkCycle + 0.1 * (deltaTime / targetDeltaTime)) % (2 * Math.PI);
            } else {
                player.walkCycle = 0; // Reset walk cycle when not walking
            }

            // Backflip logic (specific key combinations for backflip)
            if (player === player1 && keys[player1Keys.jump] && keys[player1Keys.left] && !player.jumping && !player.ducking && !player.attacking && !player.backflip && !player.frontflip && !player.blocking) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.backflip = true;
                player.backflipStartTime = Date.now();
                player.x -= player.speed * 2 * (deltaTime / targetDeltaTime);
                player.direction = 'left';
                if (player.x < 0) player.x = 0;
            } 
            // Frontflip logic (W + D for Player 1)
            else if (player === player1 && keys[player1Keys.jump] && keys[player1Keys.right] && !player.jumping && !player.ducking && !player.attacking && !player.backflip && !player.frontflip && !player.blocking) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.frontflip = true;
                player.frontflipStartTime = Date.now();
                player.x += player.speed * 2 * (deltaTime / targetDeltaTime);
                player.direction = 'right';
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            }
            // Backflip logic for Player 2 (ArrowUp + ArrowRight)
            else if (player === player2 && keys[player2Keys.jump] && keys[player2Keys.right] && !player.jumping && !player.ducking && !player.attacking && !player.backflip && !player.frontflip && !player.blocking) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.backflip = true;
                player.backflipStartTime = Date.now();
                player.x += player.speed * 2 * (deltaTime / targetDeltaTime);
                player.direction = 'right';
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            }
            // Frontflip logic for Player 2 (ArrowUp + ArrowLeft)
            else if (player === player2 && keys[player2Keys.jump] && keys[player2Keys.left] && !player.jumping && !player.ducking && !player.attacking && !player.backflip && !player.frontflip && !player.blocking) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.frontflip = true;
                player.frontflipStartTime = Date.now();
                player.x -= player.speed * 2 * (deltaTime / targetDeltaTime);
                player.direction = 'left';
                if (player.x < 0) player.x = 0;
            }
            // Regular jump
            else if (keys[playerKeybinds.jump] && !player.jumping && !player.ducking && !player.backflip && !player.frontflip && !player.blocking) {
                player.dy = player.jumpPower;
                player.jumping = true;
                if (keys[playerKeybinds.left]) {
                    player.x -= player.speed * (deltaTime / targetDeltaTime);
                    player.direction = 'left';
                    if (player.x < 0) player.x = 0;
                } else if (keys[playerKeybinds.right]) {
                    player.x += player.speed * (deltaTime / targetDeltaTime);
                    player.direction = 'right';
                    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                }
            }

            // Movement during backflip/frontflip
            if (player.jumping && (player.backflip || player.frontflip)) {
                if (player.backflip) {
                    if (player === player1) {
                        player.x -= (player.speed / 2) * (deltaTime / targetDeltaTime);
                        if (player.x < 0) player.x = 0;
                    } else if (player === player2) {
                        player.x += (player.speed / 2) * (deltaTime / targetDeltaTime);
                        if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                    }
                } else if (player.frontflip) {
                    if (player === player1) {
                        player.x += (player.speed / 2) * (deltaTime / targetDeltaTime);
                        if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                    } else if (player === player2) {
                        player.x -= (player.speed / 2) * (deltaTime / targetDeltaTime);
                        if (player.x < 0) player.x = 0;
                    }
                }
            }

            if (!isDuckingAttack && !player.blocking) { // Cannot duck while blocking
                player.ducking = keys[playerKeybinds.duck] && !player.jumping && !player.backflip && !player.frontflip;
            } else if (player.blocking && keys[playerKeybinds.duck]) { // Ducking while blocking
                player.ducking = true;
            } else {
                player.ducking = false;
            }


            player.dy += player.gravity * (deltaTime / targetDeltaTime);
            player.y += player.dy * (deltaTime / targetDeltaTime);
            if (player.y > 255) {
                player.y = 255;
                player.dy = 0;
                player.jumping = false;
                if (player.backflip) {
                    player.direction = player === player1 ? 'right' : 'left';
                    player.backflip = false;
                    player.backflipStartTime = null;
                }
                if (player.frontflip) {
                    player.direction = player === player1 ? 'right' : 'left'; // Land facing right
                    player.frontflip = false;
                    player.frontflipStartTime = null;
                }
            }
        }

        function drawPlayer(player) {
            let spriteKey;
            let rotateAngle = 0;
            let drawHeight = player.height;
            let drawY = player.y;
            let drawX = player.x;
            let drawWidth = player.width;
            let flip = player.direction === 'left';

            // Apply walking animation offset
            let walkOffset = 0;
            if (player.walkCycle !== 0) {
                walkOffset = Math.sin(player.walkCycle * 5) * 15; // Adjust 5 for intensity
            }
            drawY += walkOffset;

            if (player.healthBars <= 0) {
                spriteKey = 'defeated';
                drawHeight = player.defeatedHeight;
                drawWidth = player.defeatedWidth;
                drawY = canvas.height - player.defeatedHeight;
                player.jumping = false;
                player.ducking = false;
                player.backflip = false;
                player.frontflip = false;
                player.attacking = null;
                player.blocking = false;
            } else if (player.blocking) {
                if (player.ducking) {
                    spriteKey = 'duckingdefense';
                } else {
                    spriteKey = 'defense';
                }
            } else if (player.jumping) {
                if (player.backflip) {
                    spriteKey = 'jump';
                    const backflipDuration = 1000;
                    if (player.backflipStartTime) {
                        const elapsed = Date.now() - player.backflipStartTime;
                        const progress = Math.min(elapsed / backflipDuration, 1);
                        rotateAngle = player === player1 ? -progress * 2 * Math.PI : progress * 2 * Math.PI;
                    }
                    flip = player === player1 ? false : true;
                } else if (player.frontflip) { // Handle frontflip animation
                    spriteKey = 'jump'; // Use jump sprite for rotation
                    const frontflipDuration = 1000;
                    if (player.frontflipStartTime) {
                        const elapsed = Date.now() - player.frontflipStartTime;
                        const progress = Math.min(elapsed / frontflipDuration, 1);
                        rotateAngle = player === player1 ? progress * 2 * Math.PI : -progress * 2 * Math.PI; // Rotate forward
                    }
                    flip = player === player1 ? false : true; // Land facing right
                }
                else if (player.attacking === 'punch') {
                    spriteKey = 'jumppunch';
                } else if (player.attacking === 'kick') {
                    spriteKey = 'jumpkick';
                } else {
                    spriteKey = 'jump';

            } else if (player.ducking) {
                if (player.attacking === 'punch') spriteKey = 'duckingpunch';
                else if (player.attacking === 'kick') spriteKey = 'duckingkick';
                else spriteKey = 'ducking';
            } else {

                else if (player.attacking === 'kick') spriteKey = 'kick';
                else spriteKey = 'idle';

        function spawnRoyalRumbleFighter() {
            if (remainingCharacters.length === 0) {
                return; // No more characters to spawn
            }
            if (activeFighters.length >= MAX_ACTIVE_FIGHTERS) {
                return; // Max fighters on screen
            }

        function gameLoop(timestamp) {
            if (!gameStarted) {
                drawStartScreen();
                prevKeys = { ...keys };
                return;
            }

            if (modeSelectionScreen.style.display === 'block' || selectionScreen.style.display === 'block' || settingsScreen.style.display === 'block' || loadingScreen.style.display === 'flex' || mapSelectionScreen.style.display === 'block') {
                prevKeys = { ...keys };
                return;
            }

            if (isPaused) {
                // When paused, only draw the current state and the pause screen
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                applyScreenShake();
                if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                    ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
                }
                // Draw referee behind players
                if (currentRefereeSprite.complete && currentRefereeSprite.naturalWidth > 0) {
                    ctx.drawImage(currentRefereeSprite, (canvas.width - 150) / 2, 255, 150, 255); // Centered, same size as players
                }
                // Draw all active fighters in Royal Rumble
                if (gameMode === 'RoyalRumble') {
                    activeFighters.forEach(fighter => drawPlayer(fighter));
                    defeatedFighters.forEach(fighter => drawPlayer(fighter)); // Draw defeated fighters
                } else {
                    drawPlayer(player1);
                    drawPlayer(player2);
                    if (gameMode === 'TeamFight') {
                        drawPlayer(player3);
                        drawPlayer(player4);
                    }
                }
                drawHealthBars();
                ctx.restore();
                prevKeys = { ...keys };
                animationFrameId = requestAnimationFrame(gameLoop);
                return;
            }

            const deltaTime = Math.min(timestamp - lastUpdateTime, 100);
            lastUpdateTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            applyScreenShake();

            if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            }

            // Draw referee behind players
            if (currentRefereeSprite.complete && currentRefereeSprite.naturalWidth > 0) {
                ctx.drawImage(currentRefereeSprite, (canvas.width - 150) / 2, 225, 150, 255); // Centered, same size as players
            }

            // Draw all active fighters in Royal Rumble
            if (gameMode === 'RoyalRumble') {
                activeFighters.forEach(fighter => drawPlayer(fighter));
                defeatedFighters.forEach(fighter => drawPlayer(fighter)); // Draw defeated fighters
            } else {
                drawPlayer(player1);
                drawPlayer(player2);
                if (gameMode === 'TeamFight') {
                    drawPlayer(player3);
                    drawPlayer(player4);
                }
            }
            drawHealthBars();

            if (gameOverScreen.style.display === 'block') {
                ctx.restore();
                prevKeys = { ...keys };
                animationFrameId = requestAnimationFrame(gameLoop);
                return;
            }

            if (roundStartTime !== null && Date.now() - roundStartTime < roundDisplayDuration) {
                roundDisplay.textContent = `Round ${currentRound}, Fight!`;
                roundDisplay.style.display = 'block';
                winnerDisplay.style.display = 'none';
            } else if (winnerDisplayTime !== null && Date.now() - winnerDisplayTime < postRoundDuration) {
                winnerDisplay.style.display = 'block';
                roundDisplay.style.display = 'none';
                roundInProgress = false;
                // Keep players moving if they are still alive during post-round display
                if (gameMode === 'RoyalRumble') {
                    activeFighters.forEach(fighter => {
                        if (fighter.healthBars > 0) {
                            // For Royal Rumble, CPU opponents will target player1 if player1 is alive, otherwise target another CPU
                            const target = fighter === player1 ? null : (player1.healthBars > 0 ? player1 : activeFighters.find(f => f !== fighter && f.healthBars > 0 && f !== player1));
                            if (target) {
                                cpuAI(fighter, target, deltaTime, true);
                            } else if (fighter === player1) {
                                // Player 1 movement during post-round
                                updatePlayer(player1, null, player1Keys, deltaTime, false);
                            }
                        }
                    });
                } else {
                    if (player1.healthBars > 0) {
                        updatePlayer(player1, player2, player1Keys, deltaTime, false);
                    }
                    if (player2.healthBars > 0) {
                        if (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight') {
                            cpuAI(player2, player1, deltaTime, true);
                        } else {
                            updatePlayer(player2, player1, player2Keys, deltaTime, false);
                        }
                    }
                    if (gameMode === 'TeamFight') {
                        if (player3.healthBars > 0) {
                            cpuAI(player3, player2, deltaTime, true, player1); // P3 targets P2
                        }
                        if (player4.healthBars > 0) {
                            cpuAI(player4, player1, deltaTime, true, player2); // P4 targets P1
                        }
                    }
                }
            } else {
                roundDisplay.style.display = 'none';
                winnerDisplay.style.display = 'none';
                roundInProgress = true;

                if (gameMode === 'RoyalRumble') {
                    royalRumbleTimer += deltaTime;
                    if (royalRumbleTimer >= ROYAL_RUMBLE_SPAWN_INTERVAL && activeFighters.length < MAX_ACTIVE_FIGHTERS && remainingCharacters.length > 0) {
                        spawnRoyalRumbleFighter();
                        royalRumbleTimer = 0; // Reset timer
                    }

                    // Update and handle attacks for all active fighters
                    const livingFighters = activeFighters.filter(f => f.healthBars > 0);
                    livingFighters.forEach(fighter => {
                        if (fighter === player1) {
                            // Player 1 controls
                            updatePlayer(player1, null, player1Keys, deltaTime);
                        } else {
                            // CPU controls for other fighters
                            // Each CPU targets a random opponent, prioritizing player1 if player1 is alive
                            const opponents = livingFighters.filter(f => f !== fighter);
                            let target = null;
                            if (player1.healthBars > 0 && player1 !== fighter) {
                                target = player1; // Prioritize player1
                            } else if (opponents.length > 0) {
                                target = opponents[Math.floor(Math.random() * opponents.length)];
                            }
                            if (target) {
                                cpuAI(fighter, target, deltaTime);
                            }
                        }
                    });

                    // Handle attacks between all active fighters
                    for (let i = 0; i < livingFighters.length; i++) {
                        for (let j = i + 1; j < livingFighters.length; j++) {
                            handleAttack(livingFighters[i], livingFighters[j], deltaTime);
                            handleAttack(livingFighters[j], livingFighters[i], deltaTime);
                        }
                    }

                    // Move defeated fighters to the defeatedFighters array
                    const newlyDefeated = activeFighters.filter(fighter => fighter.healthBars <= 0);
                    defeatedFighters.push(...newlyDefeated);
                    activeFighters = activeFighters.filter(fighter => fighter.healthBars > 0);

                } else if (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight') {
                    cpuAI(player2, player1, deltaTime);
                    updatePlayer(player1, player2, player1Keys, deltaTime);
                } else if (gameMode === 'PlayerVSPlayer') {
                    updatePlayer(player1, player2, player1Keys, deltaTime);
                    updatePlayer(player2, player1, player2Keys, deltaTime);
                } else if (gameMode === 'TeamFight') {
                    // Player 1 controls player1
                    updatePlayer(player1, player2, player1Keys, deltaTime); 
                    // CPU for player3 (P1's partner)
                    cpuAI(player3, player2, deltaTime, false, player1); // P3 targets P2
                    // CPU for player2 (P2's opponent)
                    cpuAI(player2, player1, deltaTime, false, player4); // P2 targets P1
                    // CPU for player4 (P2's partner)
                    cpuAI(player4, player1, deltaTime, false, player2); // P4 targets P1
                }

                // Handle attacks for all active players (for non-Royal Rumble modes)
                if (gameMode !== 'RoyalRumble') {
                    if (gameMode === 'TeamFight') {
                        handleAttack(player1, player2, deltaTime);
                        handleAttack(player1, player4, deltaTime); // P1 attacks P2's partner
                        handleAttack(player3, player2, deltaTime); // P3 attacks P2
                        handleAttack(player3, player4, deltaTime); // P3 attacks P2's partner

                        handleAttack(player2, player1, deltaTime);
                        handleAttack(player2, player3, deltaTime); // P2 attacks P1's partner
                        handleAttack(player4, player1, deltaTime); // P4 attacks P1
                        handleAttack(player4, player3, deltaTime); // P4 attacks P1's partner
                    } else {
                        handleAttack(player1, player2, deltaTime);
                        handleAttack(player2, player1, deltaTime);
                    }
                }
            }

            ctx.restore();

            let gameOverCondition = false;
            let winner = null;

            if (gameMode === 'RoyalRumble') {
                if (player1.healthBars <= 0) {
                    gameOverCondition = true;
                    winner = "CPU"; // Player lost
                } else if (activeFighters.length === 1 && remainingCharacters.length === 0) {
                    gameOverCondition = true;
                    winner = "Player 1"; // Player is the last one standing
                }
            } else {
                let team1Defeated = false;
                let team2Defeated = false;

                if (gameMode === 'TeamFight') {
                    team1Defeated = (player1.healthBars <= 0 && player3.healthBars <= 0);
                    team2Defeated = (player2.healthBars <= 0 && player4.healthBars <= 0);
                } else {
                    team1Defeated = (player1.healthBars <= 0);
                    team2Defeated = (player2.healthBars <= 0);
                }

                if (team1Defeated || team2Defeated) {
                    if (winnerDisplayTime === null) {
                        roundInProgress = false;
                        winnerDisplayTime = Date.now();
                        if (team1Defeated) {
                            player2Wins++;
                            winnerDisplay.textContent = gameMode === 'TeamFight' ? `Team 2 Wins Round!` : (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight' ? `CPU (${player2.name}) Wins Round!` : `Player 2 (${player2.name}) Wins Round!`);
                            currentRefereeSprite = refereeOpponentWinSprite; // Opponent wins
                        } else {
                            player1Wins++;
                            winnerDisplay.textContent = gameMode === 'TeamFight' ? `Team 1 Wins Round!` : `Player 1 (${player1.name}) Wins Round!`;
                            currentRefereeSprite = refereePlayerWinSprite; // Player wins
                        }
                    }
                    if (winnerDisplayTime !== null && Date.now() - winnerDisplayTime >= postRoundDuration) {
                        if (player1Wins === 2 || player2Wins === 2) { // Best of 3
                            gameOverCondition = true;
                            winner = player1Wins > player2Wins ? "Player 1" : "Player 2";
                        } else {
                            currentRound++;
                            startRound();
                        }
                    }
                }
            }

            if (gameOverCondition) {
                showGameOverScreen(winner);
            } else {
                prevKeys = { ...keys };
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        function showGameOverScreen(finalWinner = null) {
            gameOverText.style.display = 'block';
            if (currentBattleMusic) {
                currentBattleMusic.pause();
                currentBattleMusic.currentTime = 0;
            }
            if (gameMode === 'RoyalRumble') {
                gameOverText.textContent = finalWinner === "Player 1" ? `You are the Royal Rumble Champion!` : `You were eliminated!`;
                gameOverTitle.textContent = finalWinner === "Player 1" ? `Victory!` : `Defeat!`;
            } else if (gameMode === 'TeamFight') {
                gameOverText.textContent = player1Wins > player2Wins ? `Team 1 Wins the Match!` : `Team 2 Wins the Match!`;
                gameOverTitle.textContent = player1Wins > player2Wins ? `Team 1 Wins!` : `Team 2 Wins!`;
            } else if (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight') {
                gameOverText.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins the Match!` : `CPU (${player2.name}) Wins the Match!`;
                gameOverTitle.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins!` : `CPU (${player2.name}) Wins!`;
            } else {
                gameOverText.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins the Match!` : `Player 2 (${player2.name}) Wins the Match!`;
                gameOverTitle.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins!` : `Player 2 (${player2.name}) Wins!`;
            }
            gameOverScreen.style.display = 'block';
            pauseButton.style.display = 'none';
            roundDisplay.style.display = 'none';
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function updateCharacterDisplay(player1Char, player2Char) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (player1Char) {
                const player1Sprite = sprites[player1Char]['idle'];
                if (player1Sprite.complete && player1Sprite.naturalWidth > 0) {
                    ctx.drawImage(player1Sprite, 10, 60, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '28px Orbitron';
                ctx.textAlign = 'left';
                ctx.fillText(player1Char, 135, 280); // Display name above sprite
            }

            if (player2Char) {
                const player2Sprite = sprites[player2Char]['idle'];
                if (player2Sprite.complete && player2Sprite.naturalWidth > 0) {
                    ctx.drawImage(player2Sprite, 800, 60, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '28px Orbitron';
                ctx.textAlign = 'right';
                ctx.fillText(player2Char, canvas.width - 135, 280); // Display name above sprite
            }

            ctx.fillStyle = 'white';
            ctx.font = '32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('', canvas.width / 2, 100);
        }

        // New function for Team Fight character display
        function updateCharacterDisplayTeam(p1Char, p3Char, p2Char, p4Char) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Team 1 (Player 1 and Partner)
            if (p1Char) {
                const p1Sprite = sprites[p1Char]['idle'];
                if (p1Sprite.complete && p1Sprite.naturalWidth > 0) {
                    ctx.drawImage(p1Sprite, 1, 30, 370, 450); // Smaller size for multiple characters
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'left';
                ctx.fillText(p1Char, 1, 25);
            }
            if (p3Char) {
                const p3Sprite = sprites[p3Char]['idle'];
                if (p3Sprite.complete && p3Sprite.naturalWidth > 0) {
                    ctx.drawImage(p3Sprite, 10, 100, 370, 450); // Position next to P1
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'left';
                ctx.fillText(p3Char, 10, 95);
            }

            // Team 2 (Opponent and Partner)
            if (p2Char) {
                const p2Sprite = sprites[p2Char]['idle'];
                if (p2Sprite.complete && p2Sprite.naturalWidth > 0) {
                    ctx.drawImage(p2Sprite, 791, 30, 370, 450); // Position for opponent
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'right';
                ctx.fillText(p2Char, canvas.width - 1, 25);
            }
            if (p4Char) {
                const p4Sprite = sprites[p4Char]['idle'];
                if (p4Sprite.complete && p4Sprite.naturalWidth > 0) {
                    ctx.drawImage(p4Sprite, 800, 100, 370, 450); // Position next to opponent
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'right';
                ctx.fillText(p4Char, canvas.width - 10, 95);
            }

            ctx.fillStyle = 'white';
            ctx.font = '32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('', canvas.width / 2, 100);
        }

        drawStartScreen();
    </script>
</body>
</html>

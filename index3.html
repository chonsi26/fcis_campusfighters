<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Fighters</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        canvas {
            border: 3px solid black;
            display: block;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        #gameOver, #selectionScreen, #modeSelectionScreen, #roundDisplay, #winnerDisplay, #gameOverScreen, #settingsScreen, #startScreen, #loadingScreen, #pauseScreen, #mapSelectionScreen, #cutsceneScreen { /* Added #cutsceneScreen */
            position: absolute;
            font-family: Arial, sans-serif;
            text-align: center;
            color: rgb(255, 255, 255);
            text-shadow: 3px 3px 6px black;
            top: 100px;
        }
        #gameOver {
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            color: red;
            z-index: 2;
        }
        #roundDisplay {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #f3a33d;
            display: none;
            z-index: 2;
        }
        #winnerDisplay {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #f3a33d;
            display: none;
            z-index: 2;
        }
        #selectionScreen, #modeSelectionScreen, #gameOverScreen, #settingsScreen, #pauseScreen, #mapSelectionScreen {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2;
        }
        #selectionScreen {
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            padding: 25px;
            border-radius: 15px;
            background: transparent;
            overflow-y: auto;
            z-index: 2;
            scrollbar-width: none; /* For Firefox */
            -ms-overflow-style: none; /* For Internet Explorer and Edge */
        }

        #selectionScreen::-webkit-scrollbar {
            display: none; /* Hide scrollbar for WebKit browsers */
        }

        #selectionScreen h2, #modeSelectionScreen h2, #gameOverScreen h2, #settingsScreen h2, #startScreen h2, #loadingScreen h2, #pauseScreen h2, #mapSelectionScreen h2, #cutsceneScreen h2 { /* Added #cutsceneScreen h2 */
            margin: 0 0 25px;
            font-size: 32px;
            font-family: 'Orbitron', sans-serif;
        }
        #modeSelectionScreen button, #gameOverScreen button, #settingsScreen button, #pauseButton, #pauseScreen button, #mapSelectionScreen button, #cutsceneScreen button { /* Added #cutsceneScreen button */
            padding: 12px 25px;
            margin: 6px;
            font-size: 20px;
            cursor: pointer;
            background-color: #257fc1;
            color: #f3a33d;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
        }
        #modeSelectionScreen button:hover, #gameOverScreen button:hover, #settingsScreen button:hover, #pauseButton:hover, #pauseScreen button:hover, #mapSelectionScreen button:hover, #cutsceneScreen button:hover { /* Added #cutsceneScreen button:hover */
            background-color: #103775;
        }
        #characterGrid {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            row-gap: 2px;
            column-gap: 5px;
            justify-items: center;
        }
        .character-portrait {
            width: 50px;
            height: 50px;
            background-color: #333;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .character-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .character-portrait:hover {
            transform: scale(1.1);
            border-color: #4CAF50;
        }
        .character-portrait.selected {
            border-color: #000000;
            transform: scale(1.1);
        }
        .character-portrait.focused {
            border-color: #f3a33d; /* Yellow border for keyboard focus */
            transform: scale(1.1);
        }
        .character-portrait .character-name {
            display: none;
        }
        #gameOverScreen, #settingsScreen, #startScreen, #modeSelectionScreen, #loadingScreen, #pauseScreen, #mapSelectionScreen, #cutsceneScreen { /* Added #cutsceneScreen */
            display: none;
        }
        #pauseButton {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-family: Arial, sans-serif;
            display: none;
            z-index: 2;
        }
        #settingsScreen label {
            display: block;
            font-size: 20px;
            margin: 15px 0 5px;
        }
        #settingsScreen input[type="range"] {
            width: 200px;
            cursor: pointer;
        }
        #settingsScreen .key-bind-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #settingsScreen .key-bind-row label {
            margin: 0;
            width: 150px;
            text-align: left;
        }
        #settingsScreen .key-bind-row input {
            width: 80px;
            text-align: center;
            padding: 5px;
            border-radius: 3px;
            border: 1px solid #ccc;
            background-color: #333;
            color: white;
            cursor: pointer;
        }
        #settingsScreen .controls-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
        }
        #settingsScreen .player-controls {
            flex: 1;
            min-width: 250px;
        }
        #startScreen {
            width: 1200px;
            height: 510px;
            background: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        #startScreen h2 {
            font-size: 48px;
            color: #f3a33d;
            animation: blink 0.8s step-end infinite;
            margin-bottom: 20px;
        }
        #startScreen p {
            font-size: 32px;
            color: white;
            animation: blink 0.8s step-end infinite;
        }
        #loadingScreen {
            width: 1200px;
            height: 510px;
            background: transparent;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        #loadingScreen h2 {
            font-size: 48px;
            color: #f3a33d;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        #gamemodebackground {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 510px;
            background-image: url('gamemode_background.png');
            background-size: cover;
            background-position: center;
            border: 3px solid black;
            z-index: 0;
            display: none;
        }
        #characterselectionbackground {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 510px;
            background-image: url('gamemode_background.png');
            background-size: cover;
            background-position: center;
            border: 3px solid black;
            z-index: 0;
            display: none;
        }
        /* New style for settings background */
        #settingsbackground {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 510px;
            background-image: url('gamemode_background.png'); /* Assuming you have a settings_background.png */
            background-size: cover;
            background-position: center;
            border: 3px solid black;
            z-index: 0;
            display: none; /* Hidden by default */
        }
        #mapSelectionScreen {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 450px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            z-index: 2;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #mapSelectionScreen::-webkit-scrollbar {
            display: none;
        }
        #mapGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }
        .map-preview {
            width: 250px;
            height: 150px;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .map-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .map-preview:hover, .map-preview.focused {
            transform: scale(1.05);
            border-color: #f3a33d;
        }
        .map-preview.selected {
            border-color: #257fc1;
        }
        .map-name {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 16px;
            padding: 5px 0;
        }
        #mapPreviewDisplay {
            width: 1200px;
            height: 510px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-size: cover;
            background-position: center;
            border: 3px solid black;
            z-index: 0;
            display: none;
        }
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #f44336; /* Red color for back button */
            color: white;
            border: none;
            border-radius: 6px;
            z-index: 3; /* Ensure it's above other elements */
        }
        .back-button:hover {
            background-color: #da190b;
        }

        /* Cutscene Screen Styles */
        #cutsceneScreen {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 510px;
            background-size: cover;
            background-position: center;
            border: 3px solid black;
            z-index: 2;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }
        #cutsceneScreen .cutscene-dialogue-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
            text-align: left;
            z-index: 3; /* Added or increased z-index */
            position: relative; /* Ensure z-index works */
        }
        #cutsceneScreen .cutscene-dialogue-box p {
            margin: 0;
            font-size: 24px;
            color: white;
        }
        #cutsceneScreen .cutscene-character-name {
            font-weight: bold;
            color: yellow;
            margin-bottom: 5px;
            font-size: 28px;
        }
        #cutsceneScreen .cutscene-character-sprite {
            position: absolute;
            bottom: -140px; /* Adjust as needed */
            height: 540px; /* Adjust sprite size */
            object-fit: contain;
        }
        #cutsceneScreen .cutscene-character-sprite.left {
            left: 130px;
            transform: scaleX(1); /* Normal direction */
        }
        #cutsceneScreen .cutscene-character-sprite.right {
            right: 130px;
            transform: scaleX(-1); /* Flipped direction */
        }
        #cutsceneScreen .cutscene-character-sprite.center {
            left: 50%;
            transform: translateX(-50%);
        }
        #cutsceneScreen .cutscene-character-sprite.left-center {
            left: 450px;
            transform: translateX(-50%);
        }
        #cutsceneScreen .cutscene-character-sprite.right-center {
            right: 150px;
            transform: translateX(-50%);
        }
        #cutsceneScreen .cutscene-character-sprite.hidden {
            display: none;
        }
        #cutsceneScreen .cutscene-next-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            background-color: #257fc1;
            color: white;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="gamemodebackground"></div>
    <div id="characterselectionbackground"></div>
    <div id="settingsbackground"></div> <!-- New div for settings background -->
    <div id="mapPreviewDisplay"></div> <!-- New div for map preview -->
    <canvas id="gameCanvas" width="1200" height="510"></canvas>
    <div id="gameOver">Game Over!</div>
    <div id="roundDisplay">Round 1, Fight!</div>
    <div id="winnerDisplay"></div>
    <div id="modeSelectionScreen">
        <h2>Main Menu</h2>
        <button onclick="selectGameMode('PlayerVSPlayer')">Player VS Player</button>
        <button onclick="selectGameMode('PlayerVSCPU')">Player VS CPU</button>
        <button onclick="selectGameMode('CustomFight')">Custom Fight</button>
        <button onclick="selectGameMode('TeamFight')">2 VS 2 Fight</button>
        <button onclick="selectGameMode('StoryMode')">Story Mode</button> <!-- New button for Story Mode -->
        <button onclick="showSettings()">Settings</button>
    </div>
    <div id="selectionScreen" style="display: none;">
        
        <h2 id="selectionTitle">Player 1: Select Character</h2>
        <div id="characterGrid"></div>
    </div>
    <div id="mapSelectionScreen">
        <button class="back-button" onclick="goBackFromMapSelection()">Back</button>
        <h2>Select Map</h2>
        <div id="mapGrid"></div>
        <button onclick="confirmMapSelection()">Start Fight</button>
    </div>
    <div id="gameOverScreen">
        <h2 id="gameOverTitle"></h2>
        <button onclick="restartMatch()">Restart Match</button>
        <button><a href = "reset.html">Quit</a></button>
    </div>
    <div id="settingsScreen">
        <label for="musicVolume">Background Music Volume</label>
        <input type="range" id="musicVolume" min="0" max="100" value="100">
        <label for="soundVolume">Sound Effects Volume</label>
        <input type="range" id="soundVolume" min="0" max="100" value="100">

        <div class="controls-container">
            <div class="player-controls">
                <h3>Player 1 Controls</h3>
                <div class="key-bind-row">
                    <label for="p1-left">Left:</label>
                    <input type="text" id="p1-left" data-action="p1-left" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p1-right">Right:</label>
                    <input type="text" id="p1-right" data-action="p1-right" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p1-jump">Jump:</label>
                    <input type="text" id="p1-jump" data-action="p1-jump" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p1-duck">Duck:</label>
                    <input type="text" id="p1-duck" data-action="p1-duck" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p1-punch">Punch:</label>
                    <input type="text" id="p1-punch" data-action="p1-punch" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p1-kick">Kick:</label>
                    <input type="text" id="p1-kick" data-action="p1-kick" readonly>
                </div>
            </div>

            <div class="player-controls">
                <h3>Player 2 Controls</h3>
                <div class="key-bind-row">
                    <label for="p2-left">Left:</label>
                    <input type="text" id="p2-left" data-action="p2-left" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p2-right">Right:</label>
                    <input type="text" id="p2-right" data-action="p2-right" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p2-jump">Jump:</label>
                    <input type="text" id="p2-jump" data-action="p2-jump" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p2-duck">Duck:</label>
                    <input type="text" id="p2-duck" data-action="p2-duck" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p2-punch">Punch:</label>
                    <input type="text" id="p2-punch" data-action="p2-punch" readonly>
                </div>
                <div class="key-bind-row">
                    <label for="p2-kick">Kick:</label>
                    <input type="text" id="p2-kick" data-action="p2-kick" readonly>
                </div>
            </div>
        </div>

        <button onclick="goBackToMenu()">Back</button>
    </div>
    <div id="pauseScreen">
        <h2>Paused</h2>
        <button onclick="resumeGame()">Continue</button>
        <button onclick="restartMatch()">Restart Match</button>
        <button><a href = "reset.html">Quit</a></button>
    </div>
    <div id="startScreen">
        <p>Press Any Key to Start your Story Mode</p>
    </div>
    <div id="loadingScreen">
        <h2>Loading...</h2>
    </div>
    <button id="pauseButton" onclick="togglePause()">Pause</button>

    <!-- Cutscene Screen -->
    <div id="cutsceneScreen">
        <img id="cutsceneSpriteLeft" class="cutscene-character-sprite left hidden" src="" alt="Character Left">
        <img id="cutsceneSpriteRight" class="cutscene-character-sprite right hidden" src="" alt="Character Right">
        <img id="cutsceneSpriteCenter" class="cutscene-character-sprite center hidden" src="" alt="Character Center">
        <img id="cutsceneSpriteLeftCenter" class="cutscene-character-sprite left-center hidden" src="" alt="Character Left Center">
        <img id="cutsceneSpriteRightCenter" class="cutscene-character-sprite right-center hidden" src="" alt="Character Right Center">
        <div class="cutscene-dialogue-box">
            <p class="cutscene-character-name" id="cutsceneCharacterName"></p>
            <p id="cutsceneDialogue"></p>
        </div>
        <button class="cutscene-next-button" onclick="nextCutsceneLine()">Next</button>
    </div>

        function loadKeybindings() {
            const savedP1Keys = localStorage.getItem('player1Keys');
            const savedP2Keys = localStorage.getItem('player2Keys');

            if (savedP1Keys) {
                player1Keys = JSON.parse(savedP1Keys);
            }

        }

        function saveKeybindings() {

        document.querySelectorAll('#settingsScreen input[data-action]').forEach(input => {

            });
        });

        function handleKeybindInput(e) {
            if (currentKeybindInput) {
                const newKey = e.key.toLowerCase();
                const action = currentKeybindInput.dataset.action;

                // Prevent binding 'Enter' or 'Space' for character selection
                if (newKey === 'enter' || newKey === ' ') {
                    currentKeybindInput.value = currentKeybindInput.dataset.originalValue ? currentKeybindInput.dataset.originalValue.toUpperCase() : 'INVALID';
                    currentKeybindInput = null;
                    return;
                }

                // Check for duplicate bindings
                let isDuplicate = false;
                for (const player in player1Keys) {
                    if (player1Keys[player] === newKey && `p1-${player}` !== action) {
                        isDuplicate = true;
                        break;
                    }
                }
                if (!isDuplicate) {
                    for (const player in player2Keys) {
                        if (player2Keys[player] === newKey && `p2-${player}` !== action) {
                            isDuplicate = true;
                            break;
                        }
                    }
                }

                if (isDuplicate) {
                    alert(`Key "${newKey.toUpperCase()}" is already bound to another action. Please choose a different key.`);
                    currentKeybindInput.value = currentKeybindInput.dataset.originalValue ? currentKeybindInput.dataset.originalValue.toUpperCase() : 'ERROR';
                } else {
                    currentKeybindInput.value = newKey.toUpperCase();
                    currentKeybindInput.dataset.originalValue = newKey; // Store original value

                    if (action.startsWith('p1-')) {
                        player1Keys[action.substring(3)] = newKey;
                    } else if (action.startsWith('p2-')) {
                        player2Keys[action.substring(3)] = newKey;
                    }
                    saveKeybindings();
                }
                currentKeybindInput = null;
            }
        }

        function drawStartScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (startScreenBackground.complete && startScreenBackground.naturalWidth > 0) {
                ctx.drawImage(startScreenBackground, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            // startScreen.style.display = 'flex'; // Comment out or remove this line
            menuMusic.play().catch(e => console.log("Menu music play error:", e));
        }

        function startGame() {
            if (!gameStarted) {
                gameStarted = true;
                startSound.currentTime = 0;
                startSound.play().catch(e => console.log("Start sound play error:", e));
                startScreen.style.display = 'none';
                loadingScreen.style.display = 'flex';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    // modeSelectionScreen.style.display = 'block'; // Comment out or remove this line
                    // gameModeBackground.style.display = 'block'; // Comment out or remove this line
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    selectGameMode('StoryMode'); // Directly call story mode character selection
                }, 30000); // Reduced loading time for quicker access
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            // Update the global 'keys' object based on current keybindings
            for (const action in player1Keys) {
                if (player1Keys[action] === key) {
                    keys[key] = true;
                }
            }
            for (const action in player2Keys) {
                if (player2Keys[action] === key) {
                    keys[key] = true;
                }
            }
            // Also handle Enter/Space for character selection and map selection
            if (key === 'enter' || key === ' ') {
                keys[key] = true;
            }

            // Handle 'Escape' key for pausing/unpausing
            if (key === 'escape' && gameMode !== null && !gameOverScreen.style.display === 'block' && !selectionScreen.style.display === 'block' && !modeSelectionScreen.style.display === 'block' && !settingsScreen.style.display === 'block' && !startScreen.style.display === 'flex' && !loadingScreen.style.display === 'flex' && !mapSelectionScreen.style.display === 'block' && !cutsceneScreen.style.display === 'flex') {
                togglePause();
            }

            if (!gameStarted) {
                startGame();
            }
            handleCharacterSelectionKeys();
            handleMapSelectionKeys();
        });
        document.addEventListener('DOMContentLoaded', () => {
            loadKeybindings(); // Ensure keybindings are loaded
             // Start the game immediately
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            // Update the global 'keys' object based on current keybindings
            for (const action in player1Keys) {
                if (player1Keys[action] === key) {
                    keys[key] = false;
                }
            }
            for (const action in player2Keys) {
                if (player2Keys[action] === key) {
                    keys[key] = false;
                }
            }
            // Also handle Enter/Space for character selection and map selection
            if (key === 'enter' || key === ' ') {
                keys[key] = false;
            }
        });

        function handleCharacterSelectionKeys() {
            if (selectionScreen.style.display !== 'block') return;

            const gridColumns = 10;
            const totalCharacters = characterPortraits.length;

            characterPortraits[focusedCharacterIndex].classList.remove('focused');

            let keyProcessed = false;

            if (keys[player1Keys.jump] && !prevKeys[player1Keys.jump]) { // Player 1 Jump (Up)
                focusedCharacterIndex -= gridColumns;
                if (focusedCharacterIndex < 0) focusedCharacterIndex += totalCharacters;
                keyProcessed = true;
            } else if (keys[player1Keys.duck] && !prevKeys[player1Keys.duck]) { // Player 1 Duck (Down)
                focusedCharacterIndex += gridColumns;
                if (focusedCharacterIndex >= totalCharacters) focusedCharacterIndex -= totalCharacters;
                keyProcessed = true;
            } else if (keys[player1Keys.left] && !prevKeys[player1Keys.left]) { // Player 1 Left
                focusedCharacterIndex--;
                if (focusedCharacterIndex < 0) focusedCharacterIndex = totalCharacters - 1;
                keyProcessed = true;
            } else if (keys[player1Keys.right] && !prevKeys[player1Keys.right]) { // Player 1 Right
                focusedCharacterIndex++;
                if (focusedCharacterIndex >= totalCharacters) focusedCharacterIndex = 0;
                keyProcessed = true;
            } else if ((keys.enter || keys[' ']) && !(prevKeys.enter || prevKeys[' '])) {
                const selectedChar = characterPortraits[focusedCharacterIndex].dataset.character;
                selectCharacter(selectedChar, characterPortraits[focusedCharacterIndex]);
                return;
            }

            if (keyProcessed) {
                characterPortraits[focusedCharacterIndex].classList.add('focused');
                characterPortraits[focusedCharacterIndex].focus();
                characterPortraits[focusedCharacterIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                focusSound.currentTime = 0;
                focusSound.play().catch(e => console.log("Focus sound play error:", e));
            }
        }

        function handleMapSelectionKeys() {
            if (mapSelectionScreen.style.display !== 'block') return;

            const gridColumns = 3; // 3 maps per row
            const totalMaps = maps.length;

            mapPreviews[focusedMapIndex].classList.remove('focused');

            let keyProcessed = false;

            if (keys[player1Keys.jump] && !prevKeys[player1Keys.jump]) { // Player 1 Jump (Up)
                focusedMapIndex -= gridColumns;
                if (focusedMapIndex < 0) focusedMapIndex += totalMaps;
                keyProcessed = true;
            } else if (keys[player1Keys.duck] && !prevKeys[player1Keys.duck]) { // Player 1 Duck (Down)
                focusedMapIndex += gridColumns;
                if (focusedMapIndex >= totalMaps) focusedMapIndex -= totalMaps;
                keyProcessed = true;
            } else if (keys[player1Keys.left] && !prevKeys[player1Keys.left]) { // Player 1 Left
                focusedMapIndex--;
                if (focusedMapIndex < 0) focusedMapIndex = totalMaps - 1;
                keyProcessed = true;
            } else if (keys[player1Keys.right] && !prevKeys[player1Keys.right]) { // Player 1 Right
                focusedMapIndex++;
                if (focusedMapIndex >= totalMaps) focusedMapIndex = 0;
                keyProcessed = true;
            } else if ((keys.enter || keys[' ']) && !(prevKeys.enter || prevKeys[' '])) {
                selectMap(maps[focusedMapIndex].name, mapPreviews[focusedMapIndex]);
                return;
            }

            if (keyProcessed) {
                mapPreviews[focusedMapIndex].classList.add('focused');
                mapPreviews[focusedMapIndex].focus();
                mapPreviews[focusedMapIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                focusSound.currentTime = 0;
                focusSound.play().catch(e => console.log("Focus sound play error:", e));
                updateMapPreview(maps[focusedMapIndex].image);
            }
        }

        function populateCharacterGrid() {
            const characterGrid = document.getElementById('characterGrid');
            characterGrid.innerHTML = '';
            const charactersList = Object.keys(characters); // Use all characters
            
            characterPortraits = [];
            charactersList.forEach((char, index) => {
                const portraitDiv = document.createElement('div');
                portraitDiv.classList.add('character-portrait');
                portraitDiv.dataset.character = char;
                
                const img = sprites[char]['portrait'];
                if (img.complete && img.naturalWidth > 0) {
                    const portraitImg = document.createElement('img');
                    portraitImg.src = img.src;
                    portraitImg.alt = char;
                    portraitDiv.appendChild(portraitImg);
                } else {
                    portraitDiv.style.backgroundColor = characters[char].color;
                }

                const nameSpan = document.createElement('span');
                nameSpan.classList.add('character-name');
                nameSpan.textContent = char;
                portraitDiv.appendChild(nameSpan);
                
                portraitDiv.addEventListener('click', () => selectCharacter(char, portraitDiv));
                portraitDiv.addEventListener('focus', () => {
                    if (gameMode === 'StoryMode') {
                        updateCharacterDisplay(char, null); // Only show main character for story mode selection
                    } else if (selectingPlayer === 1) {

        function cpuAI(player, opponent, deltaTime, allowMovementOnly = false, teamMate = null) {
            if (player.healthBars <= 0) return;
            const distance = Math.abs(player.x - opponent.x);
            const random = Math.random();

            if (player.attackCooldown <= 0) {
                player.attacking = null;
            }
            player.ducking = false;
            player.backflip = false;
            player.backflipStartTime = null;
            player.isMovingHorizontally = false; // Reset movement flag

            player.direction = player.x < opponent.x ? 'right' : 'left';

            if (!allowMovementOnly) {
                if (distance > 150 && !player.attacking) {
                    const moveSpeed = (player.attacking ? player.speed * 0.5 : player.speed) * (deltaTime / targetDeltaTime);
                    if (player.x < opponent.x) {
                        player.x += moveSpeed;
                    } else {
                        player.x -= moveSpeed;
                    }
                    player.isMovingHorizontally = true; // Set movement flag
                }

                if (random < 0.02 && !player.jumping && !player.ducking && !player.attacking) {
                    player.dy = player.jumpPower;
                    player.jumping = true;
                }

                if (distance < 150 && player.attackCooldown <= 0) {
                    if (random < 0.5) {
                        player.attacking = random < 0.25 ? 'punch' : 'kick';
                        player.attackCooldown = 30;
                    }
                }

                if (random < 0.05 && !player.jumping && !player.attacking) {
                    player.ducking = true;
                }
            } else {
                if (distance > 150) {
                    const moveSpeed = player.speed * (deltaTime / targetDeltaTime);
                    if (player.x < opponent.x) {
                        player.x += moveSpeed;
                    } else {
                        player.x -= moveSpeed;
                    }
                    player.isMovingHorizontally = true; // Set movement flag
                }

                if (random < 0.02 && !player.jumping && !player.ducking) {
                    player.dy = player.jumpPower;
                    player.jumping = true;
                }

                if (random < 0.05 && !player.jumping) {
                    player.ducking = true;
                }
            }

            player.dy += player.gravity * (deltaTime / targetDeltaTime);
            player.y += player.dy * (deltaTime / targetDeltaTime);
            if (player.y > 255) {
                player.y = 255;
                player.dy = 0;
                player.jumping = false;
            }

            if (player.attackCooldown > 0) {
                player.attackCooldown -= (deltaTime / targetDeltaTime);
                if (player.attackCooldown <= 15) player.attacking = null;
            }

            if (player.x < 50) player.x = 50;
            if (player.x > canvas.width - player.width - 50) player.x = canvas.width - player.width - 50;

            // Walking animation logic for CPU
            if (player.isMovingHorizontally && !player.jumping && !player.ducking && !player.attacking) {
                player.walkAnimationTimer += deltaTime;
                const walkCycleDuration = 90; // Adjust for faster/slower bobbing
                const walkHeight = 5; // Max vertical offset for bobbing
                player.walkAnimationOffset = Math.sin(player.walkAnimationTimer / walkCycleDuration * Math.PI) * walkHeight;
            } else {
                player.walkAnimationOffset = 0;
                player.walkAnimationTimer = 0;
            }
        }

                ctx.fillStyle = 'white';
                ctx.font = '18px Arial';
                ctx.fillText(`P2 Partner: ${player4.name || 'Unknown'} (${player4.healthBars} Bars)`, 775, 57);
            }
        }

        function checkCollision(attacker, opponent) {
            const attackRange = attacker.direction === 'right' ? 
                { x: attacker.x + attacker.width, y: attacker.y, width: 100, height: attacker.height } :
                { x: attacker.x - 100, y: attacker.y, width: 100, height: attacker.height };
            const opponentHitbox = {
                x: opponent.x,
                y: opponent.y,
                width: opponent.width,
                height: opponent.healthBars <= 0 ? opponent.defeatedHeight : opponent.height
            };
            const collides = attackRange.x < opponentHitbox.x + opponentHitbox.width &&
                             attackRange.x + attackRange.width > opponentHitbox.x &&
                             attackRange.y < opponentHitbox.y + opponentHitbox.height &&
                             attackRange.y + attackRange.height > opponentHitbox.y;
            return collides;
        }

        function triggerScreenShake(intensity = 3, duration = 6) {
            screenShake.intensity = intensity;
            screenShake.duration = duration;
        }

        function applyScreenShake() {
            if (screenShake.duration > 0) {
                const shakeX = (Math.random() - 0.5) * screenShake.intensity;
                const shakeY = (Math.random() - 0.5) * screenShake.intensity;
                ctx.translate(shakeX, shakeY);
                screenShake.duration--;
            }
        }

        function handleAttack(attacker, opponent, deltaTime) {
            if (!roundInProgress || opponent.healthBars <= 0) return;

            if (gameMode === 'TeamFight' || gameMode === 'StoryMode') {
                if (attacker.team === opponent.team) {
                    return;
                }
            }

            if (attacker.attacking && opponent.healthBars > 0) {
                if (checkCollision(attacker, opponent)) {
                    let damage = attacker.attacking === 'punch' ? attacker.punchDamage : attacker.kickDamage;
                    
                    // Adjust damage for Player 1 vs CPU in 1v1 modes
                    if ((gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight') && attacker === player1) {
                        damage *= 1.5;
                    }
                    // Adjust damage for Player 1 vs CPU in TeamFight mode (P1 vs P2/P4)
                    if (gameMode === 'TeamFight' && attacker === player1 && (opponent === player2 || opponent === player4)) {
                        damage *= 1.5;
                    }
                    // Adjust damage for Main Character in Story Mode
                    if (gameMode === 'StoryMode' && attacker === player1) {
                        damage *= 1.5;
                    }

                    opponent.health -= damage * (deltaTime / targetDeltaTime);
                    if (attacker.attacking === 'punch') {
                        punchSound.currentTime = 0;
                        punchSound.play().catch(e => console.log("Punch sound play error:", e));
                    } else if (attacker.attacking === 'kick') {
                        kickSound.currentTime = 0;
                        kickSound.play().catch(e => console.log("Kick sound play error:", e));
                    }
                    triggerScreenShake();
                    if (opponent.health <= 0) {
                        if (opponent.healthBars > 1) {
                            opponent.health = 100;
                            opponent.healthBars--;
                        } else {
                            opponent.health = 0;
                            opponent.healthBars = 0;
                        }
                    }
                }
            }
        }

        function updatePlayer(player, opponent, playerKeybinds, deltaTime, allowAttacks = true) {
            if (!roundInProgress && player.healthBars <= 0) return;
            let isDuckingAttack = false;
            player.isMovingHorizontally = false; // Reset for current frame

            if (allowAttacks && keys[playerKeybinds.duck]) {
                if (keys[playerKeybinds.left] && keys[playerKeybinds.punch] && player.attackCooldown <= 0) {
                    player.attacking = 'punch';
                    player.direction = 'left';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.backflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                } else if (keys[playerKeybinds.left] && keys[playerKeybinds.kick] && player.attackCooldown <= 0) {
                    player.attacking = 'kick';
                    player.direction = 'left';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.backflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                } else if (keys[playerKeybinds.right] && keys[playerKeybinds.punch] && player.attackCooldown <= 0) {
                    player.attacking = 'punch';
                    player.direction = 'right';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.backflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                } else if (keys[playerKeybinds.right] && keys[playerKeybinds.kick] && player.attackCooldown <= 0) {
                    player.attacking = 'kick';
                    player.direction = 'right';
                    player.ducking = true;
                    player.jumping = false;
                    player.backflip = false;
                    player.backflipStartTime = null;
                    player.attackCooldown = 30;
                    isDuckingAttack = true;
                }
            }

            if (player.attackCooldown > 0) {
                player.attackCooldown -= (deltaTime / targetDeltaTime);
                if (player.attackCooldown <= 15) player.attacking = null;
            }

            // Existing attack logic
            if (allowAttacks) {
                if (!isDuckingAttack && keys[playerKeybinds.punch] && player.attackCooldown <= 0) {
                    player.attacking = 'punch';
                    player.attackCooldown = 30;
                } else if (!isDuckingAttack && keys[playerKeybinds.kick] && player.attackCooldown <= 0) {
                    player.attacking = 'kick';
                    player.attackCooldown = 30;
                }
            }

            if (!player.attacking && !player.backflip && !player.frontflip) { // Add !player.frontflip here
                if (keys[playerKeybinds.left] && !player.ducking && !player.jumping) {
                    player.x -= player.speed * (deltaTime / targetDeltaTime);
                    player.direction = 'left';
                    if (player.x < 0) player.x = 0;
                    player.isMovingHorizontally = true; // Set movement flag
                }
                if (keys[playerKeybinds.right] && !player.ducking && !player.jumping) {
                    player.x += player.speed * (deltaTime / targetDeltaTime);
                    player.direction = 'right';
                    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                    player.isMovingHorizontally = true; // Set movement flag
                }
            }

            // Frontflip logic for Player 1 (W + D)
            if (player === player1 && keys[player1Keys.jump] && keys[player1Keys.right] && !player.jumping && !player.ducking && !player.attacking && !player.frontflip) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.frontflip = true; // New property for frontflip
                player.frontflipStartTime = Date.now(); // New property for frontflip start time
                player.x += player.speed * 2 * (deltaTime / targetDeltaTime); // Move right during frontflip
                player.direction = 'right'; // Ensure direction is right
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            }
            // Backflip logic (specific key combinations for backflip)
            else if (player === player1 && keys[player1Keys.jump] && keys[player1Keys.left] && !player.jumping && !player.ducking && !player.attacking && !player.backflip) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.backflip = true;
                player.backflipStartTime = Date.now();
                player.x -= player.speed * 2 * (deltaTime / targetDeltaTime);
                player.direction = 'left';
                if (player.x < 0) player.x = 0;
            } else if (player === player2 && keys[player2Keys.jump] && keys[player2Keys.right] && !player.jumping && !player.ducking && !player.attacking && !player.backflip) {
                player.dy = player.jumpPower;
                player.jumping = true;
                player.backflip = true;
                player.backflipStartTime = Date.now();
                player.x += player.speed * 2 * (deltaTime / targetDeltaTime);
                player.direction = 'right';
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            } else if (keys[playerKeybinds.jump] && !player.jumping && !player.ducking && !player.backflip && !player.frontflip) { // Add !player.frontflip here
                player.dy = player.jumpPower;
                player.jumping = true;
                if (player === player1 && keys[player1Keys.jump] && keys[player1Keys.right]) {
                    player.x += (player.speed / 2) * (deltaTime / targetDeltaTime); // Reduced speed during jump-move
                    player.direction = 'right';
                    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                } else if (player === player2 && keys[player2Keys.jump] && keys[player2Keys.left]) {
                    player.x -= (player.speed / 2) * (deltaTime / targetDeltaTime); // Reduced speed during jump-move
                    player.direction = 'left';
                    if (player.x < 0) player.x = 0;
                } else if (keys[playerKeybinds.left]) {
                    player.x -= (player.speed / 2) * (deltaTime / targetDeltaTime); // Reduced speed during jump-move
                    player.direction = 'left';
                    if (player.x < 0) player.x = 0;
                } else if (keys[playerKeybinds.right]) {
                    player.x += (player.speed / 2) * (deltaTime / targetDeltaTime); // Reduced speed during jump-move
                    player.direction = 'right';
                    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
                }
            }

            // Movement during backflip/frontflip
            if (player === player1 && player.jumping && keys[player1Keys.jump] && keys[player1Keys.left] && player.backflip) {
                player.x -= (player.speed / 2) * (deltaTime / targetDeltaTime);
                if (player.x < 0) player.x = 0;
            } else if (player === player1 && player.jumping && keys[player1Keys.jump] && keys[player1Keys.right] && player.frontflip) { // Frontflip movement
                player.x += (player.speed / 2) * (deltaTime / targetDeltaTime);
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            } else if (player === player1 && player.jumping && keys[player1Keys.jump] && keys[player1Keys.right]) {
                player.x += (player.speed / 2) * (deltaTime / targetDeltaTime);
                player.direction = 'right';
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            } else if (player === player2 && player.jumping && keys[player2Keys.jump] && keys[player2Keys.left]) {
                player.x -= (player.speed / 2) * (deltaTime / targetDeltaTime);
                player.direction = 'left';
                if (player.x < 0) player.x = 0;
            } else if (player === player2 && player.jumping && keys[player2Keys.jump] && keys[player2Keys.right] && player.backflip) {
                player.x += (player.speed / 2) * (deltaTime / targetDeltaTime);
                player.direction = 'right';
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            }

            if (!isDuckingAttack) {
                player.ducking = keys[playerKeybinds.duck] && !player.jumping && !player.backflip && !player.frontflip; // Add !player.frontflip here
            }

            player.dy += player.gravity * (deltaTime / targetDeltaTime);
            player.y += player.dy * (deltaTime / targetDeltaTime);
            if (player.y > 255) {
                player.y = 255;
                player.dy = 0;
                player.jumping = false;
                if (player.backflip) {
                    player.direction = player === player1 ? 'right' : 'left';
                    player.backflip = false;
                    player.backflipStartTime = null;
                }
                if (player.frontflip) { // Reset frontflip properties
                    player.direction = 'right'; // Ensure player lands facing right
                    player.frontflip = false;
                    player.frontflipStartTime = null;
                }
            }

            // Walking animation logic
            if (player.isMovingHorizontally && !player.jumping && !player.ducking && !player.attacking) {
                player.walkAnimationTimer += deltaTime;
                const walkCycleDuration = 80; // Adjust for faster/slower bobbing
                const walkHeight = 5; // Max vertical offset for bobbing
                player.walkAnimationOffset = Math.sin(player.walkAnimationTimer / walkCycleDuration * Math.PI) * walkHeight;
            } else {
                player.walkAnimationOffset = 0;
                player.walkAnimationTimer = 0;
            }
        }


        function drawPlayer(player) {
            let spriteKey;
            let rotateAngle = 0;
            let drawHeight = player.height;
            let drawY = player.y;
            let drawWidth = player.width;
            let drawX = player.x;
            let flip = player.direction === 'left';

            // Apply walking animation offset to drawY
            drawY += player.walkAnimationOffset;

            if (player.healthBars <= 0) {
                spriteKey = 'defeated';
                drawHeight = player.defeatedHeight;
                drawWidth = player.defeatedWidth;
                drawY = canvas.height - player.defeatedHeight;
                player.jumping = false;
                player.ducking = false;
                player.backflip = false;
                player.attacking = null;
                player.frontflip = false; // Ensure frontflip is reset
            } else if (player.jumping) {
                if (player.backflip) {
                    spriteKey = 'jump';
                    const backflipDuration = 1000;
                    if (player.backflipStartTime) {
                        const elapsed = Date.now() - player.backflipStartTime;
                        const progress = Math.min(elapsed / backflipDuration, 1);
                        rotateAngle = player === player1 ? -progress * 2 * Math.PI : progress * 2 * Math.PI;
                    }
                    flip = player === player1 ? false : true;
                } else if (player.frontflip) { // Frontflip rotation
                    spriteKey = 'jump'; // Use jump sprite for frontflip
                    const frontflipDuration = 1000; // Adjust duration as needed
                    if (player.frontflipStartTime) {
                        const elapsed = Date.now() - player.frontflipStartTime;
                        const progress = Math.min(elapsed / frontflipDuration, 1);
                        rotateAngle = progress * 2 * Math.PI; // Rotate clockwise for frontflip
                    }
                    flip = false; // Player faces right during frontflip
                } else if (player.attacking === 'punch') {
                    spriteKey = 'jumppunch';
                } else if (player.attacking === 'kick') {
                    spriteKey = 'jumpkick';
                } else {
                    spriteKey = 'jump';

                if (player.attacking === 'punch') spriteKey = 'duckingpunch';
                else if (player.attacking === 'kick') spriteKey = 'duckingkick';
                else spriteKey = 'ducking';

                else if (player.attacking === 'kick') spriteKey = 'kick';
                else spriteKey = 'idle';

        function gameLoop(timestamp) {
            if (!gameStarted) {
                drawStartScreen();
                prevKeys = { ...keys };
                return;
            }

            if (modeSelectionScreen.style.display === 'block' || selectionScreen.style.display === 'block' || settingsScreen.style.display === 'block' || loadingScreen.style.display === 'flex' || mapSelectionScreen.style.display === 'block' || cutsceneScreen.style.display === 'flex') {
                prevKeys = { ...keys };
                return;
            }

            if (isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                applyScreenShake();
                if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                    ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
                }
                drawPlayer(player1);
                drawPlayer(player2);
                if (gameMode === 'TeamFight' || (gameMode === 'StoryMode' && (storyScript[storyModeProgress].fightType === '2v2' || storyScript[storyModeProgress-1]?.fightType === '2v2'))) {
                    drawPlayer(player3);
                    drawPlayer(player4);
                }
                drawHealthBars();
                ctx.restore();
                prevKeys = { ...keys };
                animationFrameId = requestAnimationFrame(gameLoop);
                return;
            }

            const deltaTime = Math.min(timestamp - lastUpdateTime, 100);
            lastUpdateTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            applyScreenShake();

            if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            }

            drawPlayer(player1);
            drawPlayer(player2);
            if (gameMode === 'TeamFight' || (gameMode === 'StoryMode' && (storyScript[storyModeProgress].fightType === '2v2' || storyScript[storyModeProgress-1]?.fightType === '2v2'))) {
                drawPlayer(player3);
                drawPlayer(player4);
            }
            drawHealthBars();

            if (gameOverScreen.style.display === 'block') {
                ctx.restore();
                prevKeys = { ...keys };
                animationFrameId = requestAnimationFrame(gameLoop);
                return;
            }

            if (roundStartTime !== null && Date.now() - roundStartTime < roundDisplayDuration) {
                roundDisplay.textContent = `Round ${currentRound}, Fight!`;
                roundDisplay.style.display = 'block';
                winnerDisplay.style.display = 'none';
            } else if (winnerDisplayTime !== null && Date.now() - winnerDisplayTime < postRoundDuration) {
                winnerDisplay.style.display = 'block';
                roundDisplay.style.display = 'none';
                roundInProgress = false;
                if (player1.healthBars > 0) {
                    updatePlayer(player1, player2, player1Keys, deltaTime, false);
                }
                if (player2.healthBars > 0) {
                    if (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight' || gameMode === 'StoryMode') {
                        cpuAI(player2, player1, deltaTime, true);
                    } else {
                        updatePlayer(player2, player1, player2Keys, deltaTime, false);
                    }
                }
                if (gameMode === 'TeamFight' || (gameMode === 'StoryMode' && (storyScript[storyModeProgress].fightType === '2v2' || storyScript[storyModeProgress-1]?.fightType === '2v2'))) {
                    if (player3.healthBars > 0) {
                        cpuAI(player3, player2, deltaTime, false, player1);
                    }
                    if (player4.healthBars > 0) {
                        cpuAI(player4, player1, deltaTime, false, player2);
                    }
                }
            } else {
                roundDisplay.style.display = 'none';
                winnerDisplay.style.display = 'none';
                roundInProgress = true;

                if (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight' || gameMode === 'StoryMode') {
                    cpuAI(player2, player1, deltaTime);
                    updatePlayer(player1, player2, player1Keys, deltaTime);
                    if (gameMode === 'StoryMode' && storyScript[storyModeProgress].fightType === '2v2') {
                        cpuAI(player3, player2, deltaTime, false, player1);
                        cpuAI(player4, player1, deltaTime, false, player2);
                    }
                } else if (gameMode === 'PlayerVSPlayer') {
                    updatePlayer(player1, player2, player1Keys, deltaTime);
                    updatePlayer(player2, player1, player2Keys, deltaTime);
                } else if (gameMode === 'TeamFight') {
                    updatePlayer(player1, player2, player1Keys, deltaTime); 
                    cpuAI(player3, player2, deltaTime, false, player1);
                    cpuAI(player2, player1, deltaTime, false, player4);
                    cpuAI(player4, player1, deltaTime, false, player2);
                }

                if (gameMode === 'TeamFight' || (gameMode === 'StoryMode' && storyScript[storyModeProgress].fightType === '2v2')) {
                    handleAttack(player1, player2, deltaTime);
                    handleAttack(player1, player4, deltaTime);
                    handleAttack(player3, player2, deltaTime);
                    handleAttack(player3, player4, deltaTime);

                    handleAttack(player2, player1, deltaTime);
                    handleAttack(player2, player3, deltaTime);
                    handleAttack(player4, player1, deltaTime);
                    handleAttack(player4, player3, deltaTime);
                } else {
                    handleAttack(player1, player2, deltaTime);
                    handleAttack(player2, player1, deltaTime);
                }
            }

            ctx.restore();

            let team1Defeated = false;
            let team2Defeated = false;

            if (gameMode === 'TeamFight' || (gameMode === 'StoryMode' && (storyScript[storyModeProgress].fightType === '2v2' || storyScript[storyModeProgress-1]?.fightType === '2v2'))) {
                team1Defeated = (player1.healthBars <= 0 && player3.healthBars <= 0);
                team2Defeated = (player2.healthBars <= 0 && player4.healthBars <= 0);
            } else {
                team1Defeated = (player1.healthBars <= 0);
                team2Defeated = (player2.healthBars <= 0);
            }

            if (team1Defeated || team2Defeated) {
                if (winnerDisplayTime === null) {
                    roundInProgress = false;
                    winnerDisplayTime = Date.now();
                    if (team1Defeated) {
                        player2Wins++;
                        winnerDisplay.textContent = gameMode === 'TeamFight' || (gameMode === 'StoryMode' && storyScript[storyModeProgress].fightType === '2v2') ? `Team 2 Wins Round!` : (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight' || gameMode === 'StoryMode' ? `CPU (${player2.name}) Wins Round!` : `Player 2 (${player2.name}) Wins Round!`);
                    } else {
                        player1Wins++;
                        winnerDisplay.textContent = gameMode === 'TeamFight' || (gameMode === 'StoryMode' && storyScript[storyModeProgress].fightType === '2v2') ? `Team 1 Wins Round!` : `Player 1 (${player1.name}) Wins Round!`;
                    }
                }
                if (winnerDisplayTime !== null && Date.now() - winnerDisplayTime >= postRoundDuration) {
                    if (gameMode === 'StoryMode') {
                        if (player1Wins > player2Wins) { // Main character won the round
                            storyModeProgress++;
                            handleStoryEvent();
                        } else { // Main character lost the round
                            showGameOverScreen('You Lost the Fight!'); // Game over for story mode loss
                        }
                    } else {
                        if (player1Wins === 2 || player2Wins === 2) {
                            showGameOverScreen();
                        } else {
                            currentRound++;
                            startRound();
                        }
                    }
                }
            }

            prevKeys = { ...keys };
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function showGameOverScreen(message = null) {
            gameOverText.style.display = 'block';
            if (currentBattleMusic) {
                currentBattleMusic.pause();
                currentBattleMusic.currentTime = 0;
            }
            if (currentCutsceneMusic) { // Stop cutscene music
                currentCutsceneMusic.pause();
                currentCutsceneMusic.currentTime = 0;
                currentCutsceneMusic = null;
            }
            if (gameMode === 'StoryMode' && message) {
                gameOverText.textContent = message;
                gameOverTitle.textContent = message;
            } else if (gameMode === 'TeamFight') {
                gameOverText.textContent = player1Wins > player2Wins ? `Team 1 Wins the Match!` : `Team 2 Wins the Match!`;
                gameOverTitle.textContent = player1Wins > player2Wins ? `Team 1 Wins!` : `Team 2 Wins!`;
            } else if (gameMode === 'PlayerVSCPU' || gameMode === 'CustomFight') {
                gameOverText.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins the Match!` : `CPU (${player2.name}) Wins the Match!`;
                gameOverTitle.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins!` : `CPU (${player2.name}) Wins!`;
            } else {
                gameOverText.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins the Match!` : `Player 2 (${player2.name}) Wins the Match!`;
                gameOverTitle.textContent = player1Wins > player2Wins ? `Player 1 (${player1.name}) Wins!` : `Player 2 (${player2.name}) Wins!`;
            }
            gameOverScreen.style.display = 'block';
            pauseButton.style.display = 'none';
            roundDisplay.style.display = 'none';
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function updateCharacterDisplay(player1Char, player2Char) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (player1Char) {
                const player1Sprite = sprites[player1Char]['idle'];
                if (player1Sprite.complete && player1Sprite.naturalWidth > 0) {
                    ctx.drawImage(player1Sprite, 10, 60, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '28px Orbitron';
                ctx.textAlign = 'left';
                ctx.fillText(player1Char, 135, 280);
            }

            if (player2Char) {
                const player2Sprite = sprites[player2Char]['idle'];
                if (player2Sprite.complete && player2Sprite.naturalWidth > 0) {
                    ctx.drawImage(player2Sprite, 800, 60, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '28px Orbitron';
                ctx.textAlign = 'right';
                ctx.fillText(player2Char, canvas.width - 135, 280);
            }

            ctx.fillStyle = 'white';
            ctx.font = '32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('', canvas.width / 2, 100);
        }

        function updateCharacterDisplayTeam(p1Char, p3Char, p2Char, p4Char) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (p1Char) {
                const p1Sprite = sprites[p1Char]['idle'];
                if (p1Sprite.complete && p1Sprite.naturalWidth > 0) {
                    ctx.drawImage(p1Sprite, 1, 30, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'left';
                ctx.fillText(p1Char, 1, 25);
            }
            if (p3Char) {
                const p3Sprite = sprites[p3Char]['idle'];
                if (p3Sprite.complete && p3Sprite.naturalWidth > 0) {
                    ctx.drawImage(p3Sprite, 10, 100, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'left';
                ctx.fillText(p3Char, 10, 95);
            }

            if (p2Char) {
                const p2Sprite = sprites[p2Char]['idle'];
                if (p2Sprite.complete && p2Sprite.naturalWidth > 0) {
                    ctx.drawImage(p2Sprite, 791, 30, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '24px Orbitron';
                ctx.textAlign = 'right';
                ctx.fillText(p2Char, canvas.width - 1, 25);
            }
            if (p4Char) {
                const p4Sprite = sprites[p4Char]['idle'];
                if (p4Sprite.complete && p4Sprite.naturalWidth > 0) {
                    ctx.drawImage(p4Sprite, 800, 100, 370, 450);
                }
                ctx.fillStyle = 'yellow';
                ctx.font = '28px Orbitron';
                ctx.textAlign = 'right';
                ctx.fillText(p4Char, canvas.width - 10, 95);
            }

            ctx.fillStyle = 'white';
            ctx.font = '32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('', canvas.width / 2, 100);
        }

        // Story Mode Functions
        function initializeStoryCharacters() {
            const allCharacters = Object.keys(characters).filter(name => name !== mainCharacterName);
            const shuffledCharacters = shuffleArray(allCharacters);
            for (let i = 2; i <= 59; i++) {
                storyCharacters[`Character${i}`] = shuffledCharacters[i - 2];
            }
            console.log("Story Characters Assigned:", storyCharacters);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startStoryMode() {
            selectionScreen.style.display = 'none';
            characterSelectionBackground.style.display = 'none';
            storyModeProgress = 0;
            handleStoryEvent();
        }

        function handleStoryEvent() {
            if (storyModeProgress >= storyScript.length) {
                console.log("Story Mode Finished!");
                showGameOverScreen('Congratulations! Story Completed!');
                return;
            }

            const event = storyScript[storyModeProgress];
            const mapImage = maps.find(m => m.name === event.map).image;
            cutsceneScreen.style.backgroundImage = `url('${mapImage}')`;

            if (event.type === 'cutscene') {
                showCutscene(event);
            } else if (event.type === 'fight') {
                startStoryFight(event);
            }
        }

        function showCutscene(cutsceneData) {
            cutsceneScreen.style.display = 'flex';
            currentCutscene = cutsceneData;
            currentCutsceneLineIndex = 0;

            // Stop all other music
            menuMusic.pause();
            menuMusic.currentTime = 0;
            if (currentBattleMusic) {
                currentBattleMusic.pause();
                currentBattleMusic.currentTime = 0;
                currentBattleMusic = null;
            }
            if (currentCutsceneMusic) {
                currentCutsceneMusic.pause();
                currentCutsceneMusic.currentTime = 0;
                currentCutsceneMusic = null;
            }

            // Play cutscene music for the current map
            const mapInfo = maps.find(m => m.name === cutsceneData.map);
            if (mapInfo && mapInfo.cutscene_music) {
                currentCutsceneMusic = document.getElementById(mapInfo.cutscene_music);
                if (currentCutsceneMusic) {
                    currentCutsceneMusic.currentTime = 0;
                    currentCutsceneMusic.play().catch(e => console.log(`Cutscene music play error for ${mapInfo.name}:`, e));
                } else {
                    console.warn(`No cutscene music element found for map: ${mapInfo.name}`);
                }
            } else {
                console.warn(`No cutscene music defined for map: ${cutsceneData.map}`);
            }

            displayCutsceneLine();
        }

        function displayCutsceneLine() {
            const line = currentCutscene.script[currentCutsceneLineIndex];
            let speaker = line.char;
            let dialogue = line.dialogue;

            // Replace placeholders with assigned character names
            dialogue = dialogue.replace(/\(Main Character\)/g, mainCharacterName);
            for (const charKey in storyCharacters) {
                dialogue = dialogue.replace(new RegExp(`\\(${charKey}\\)`, 'g'), storyCharacters[charKey]);
            }
            
            let actualSpeakerName = speaker;
            if (speaker === 'Main Character') {
                actualSpeakerName = mainCharacterName;
            } else if (storyCharacters[speaker]) {
                actualSpeakerName = storyCharacters[speaker];
            }

            cutsceneCharacterName.textContent = actualSpeakerName;
            cutsceneDialogue.textContent = dialogue;

            // Hide all sprites
            cutsceneSpriteLeft.classList.add('hidden');
            cutsceneSpriteRight.classList.add('hidden');
            cutsceneSpriteCenter.classList.add('hidden');
            cutsceneSpriteLeftCenter.classList.add('hidden');
            cutsceneSpriteRightCenter.classList.add('hidden');

            // Determine which characters are present in this cutscene
            const presentCharacters = currentCutscene.characters.map(charKey => {
                if (charKey === 'Main Character') return mainCharacterName;
                return storyCharacters[charKey];
            }).filter(Boolean); // Filter out any undefined/null values

            // Assign sprites based on the number of present characters and their order
            if (presentCharacters.length === 1) {
                const charName = presentCharacters[0];
                cutsceneSpriteCenter.src = sprites[charName]['idle'].src;
                cutsceneSpriteCenter.classList.remove('hidden');
            } else if (presentCharacters.length === 2) {
                const char1 = presentCharacters[0];
                const char2 = presentCharacters[1];

                // Assign fixed positions for two characters
                cutsceneSpriteLeft.src = sprites[char1]['idle'].src;
                cutsceneSpriteLeft.classList.remove('hidden');
                cutsceneSpriteRight.src = sprites[char2]['idle'].src;
                cutsceneSpriteRight.classList.remove('hidden');

                // Ensure the speaking character is slightly highlighted or moved if desired
                // This part is optional and depends on desired visual effect
                // For now, they just stay in their fixed positions.
            } else if (presentCharacters.length === 3) {
                const char1 = presentCharacters[0];
                const char2 = presentCharacters[1];
                const char3 = presentCharacters[2];

                if (char1) { cutsceneSpriteLeft.src = sprites[char1]['idle'].src; cutsceneSpriteLeft.classList.remove('hidden'); }
                if (char2) { cutsceneSpriteCenter.src = sprites[char2]['idle'].src; cutsceneSpriteCenter.classList.remove('hidden'); }
                if (char3) { cutsceneSpriteRight.src = sprites[char3]['idle'].src; cutsceneSpriteRight.classList.remove('hidden'); }
            } else if (presentCharacters.length === 4) {
                const char1 = presentCharacters[0];
                const char2 = presentCharacters[1];
                const char3 = presentCharacters[2];
                const char4 = presentCharacters[3];

                if (char1) { cutsceneSpriteLeft.src = sprites[char1]['idle'].src; cutsceneSpriteLeft.classList.remove('hidden'); }
                if (char2) { cutsceneSpriteLeftCenter.src = sprites[char2]['idle'].src; cutsceneSpriteLeftCenter.classList.remove('hidden'); }
                if (char3) { cutsceneSpriteRightCenter.src = sprites[char3]['idle'].src; cutsceneSpriteRightCenter.classList.remove('hidden'); }
                if (char4) { cutsceneSpriteRight.src = sprites[char4]['idle'].src; cutsceneSpriteRight.classList.remove('hidden'); }
            }
            // Add more conditions for other numbers of characters if needed
        }

        function nextCutsceneLine() {
            currentCutsceneLineIndex++;
            if (currentCutsceneLineIndex < currentCutscene.script.length) {
                displayCutsceneLine();
            } else {
                cutsceneScreen.style.display = 'none';
                if (currentCutsceneMusic) { // Stop cutscene music when cutscene ends
                    currentCutsceneMusic.pause();
                    currentCutsceneMusic.currentTime = 0;
                    currentCutsceneMusic = null;
                }
                storyModeProgress++;
                handleStoryEvent();
            }
        }

        function startStoryFight(fightData) {
            // Stop cutscene music if it was playing
            if (currentCutsceneMusic) {
                currentCutsceneMusic.pause();
                currentCutsceneMusic.currentTime = 0;
                currentCutsceneMusic = null;
            }

            // Set up players for the fight based on fightData
            player1 = { ...player1, ...characters[mainCharacterName], name: mainCharacterName, team: 'player' };
            player1Character = mainCharacterName;

            if (fightData.fightType === '1v1') {
                const opponentName = storyCharacters[fightData.player2];
                player2 = { ...player2, ...characters[opponentName], name: opponentName, team: 'cpu' };
                player3.healthBars = 0; // Ensure partners are defeated
                player4.healthBars = 0;
            } else if (fightData.fightType === '2v2') {
                const partnerName = storyCharacters[fightData.player2];
                const opponent1Name = storyCharacters[fightData.opponent1];
                const opponent2Name = storyCharacters[fightData.opponent2];

                player1 = { ...player1, ...characters[mainCharacterName], name: mainCharacterName, team: 'player' };
                player3 = { ...player3, ...characters[partnerName], name: partnerName, team: 'player' };
                player2 = { ...player2, ...characters[opponent1Name], name: opponent1Name, team: 'cpu' };
                player4 = { ...player4, ...characters[opponent2Name], name: opponent2Name, team: 'cpu' };
            }

            // Set background image for the fight
            const mapInfo = maps.find(m => m.name === fightData.map);
            const mapImage = mapInfo.image;
            backgroundImage.src = mapImage;
            backgroundImage.onload = () => {
                // Stop menu music and start battle music
                menuMusic.pause();
                menuMusic.currentTime = 0;
                if (currentBattleMusic) {
                    currentBattleMusic.pause();
                    currentBattleMusic.currentTime = 0;
                }
                currentBattleMusic = mapMusic[mapInfo.name];
                if (currentBattleMusic) {
                    currentBattleMusic.currentTime = 0;
                    currentBattleMusic.play().catch(e => console.log(`Map music play error for ${mapInfo.name}:`, e));
                } else {
                    console.warn(`No battle music found for map: ${mapInfo.name}`);
                }
                startRound();
            };
            backgroundImage.onerror = () => {
                console.error(`Failed to load map image for fight: ${fightData.map}`);
                // Fallback to default or handle error
                backgroundImage.src = 'background.png';
                menuMusic.pause();
                menuMusic.currentTime = 0;
                if (currentBattleMusic) {
                    currentBattleMusic.pause();
                    currentBattleMusic.currentTime = 0;
                }
                currentBattleMusic = mapMusic['FCSIT Department'];
                if (currentBattleMusic) {
                    currentBattleMusic.currentTime = 0;
                    currentBattleMusic.play().catch(e => console.log("Fallback battle music play error:", e));
                }
                startRound();
            };
        }

        drawStartScreen();
    </script>
